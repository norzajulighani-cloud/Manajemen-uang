<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manajemen Uang</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#764ba2">
<link rel="apple-touch-icon" href="./icon-192.png">

<style>
/* --- VARIABEL TEMA TERANG --- */
:root {
  --primary-grad: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  --success-grad: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
  --danger-grad: linear-gradient(135deg, #ff6b6b 0%, #ff8787 100%);
  
  --bg: #e0e5ec;
  --card-bg: rgba(255, 255, 255, 0.5);
  --text-main: #2d3436;
  --text-sub: #636e72;
  --input-bg: var(--bg);
  
  --shadow-out: 7px 7px 15px rgba(163,177,198,0.6), -7px -7px 15px rgba(255,255,255, 0.5);
  --shadow-in: inset 3px 3px 6px rgba(163,177,198,0.5), inset -3px -3px 6px rgba(255,255,255, 0.5);
  --ease: cubic-bezier(0.23, 1, 0.32, 1);
}

/* --- VARIABEL TEMA GELAP --- */
body.dark-mode {
  --bg: #1a1e23;
  --card-bg: rgba(30, 34, 40, 0.5);
  --text-main: #e0e5ec;
  --text-sub: #8b9bb4;
  --input-bg: #15181c;
  
  --shadow-out: 5px 5px 12px rgba(0,0,0,0.5), -5px -5px 12px rgba(45,50,55, 0.3);
  --shadow-in: inset 2px 2px 5px rgba(0,0,0,0.5), inset -2px -2px 5px rgba(45,50,55, 0.3);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  margin: 0; font-family: 'Poppins', system-ui, -apple-system, sans-serif;
  background-color: var(--bg); color: var(--text-main); font-size: 14px;
  overflow-x: hidden; padding-bottom: 80px; transition: background-color 0.4s var(--ease), color 0.4s;
}

@keyframes slideInUp { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.container { max-width: 500px; margin: 0 auto; padding: 0 15px; position: relative; }

header {
  text-align: center; padding: 25px 0; font-size: 24px; font-weight: 800;
  background: var(--primary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: scaleIn 0.5s var(--ease);
}

.theme-toggle {
  position: absolute; top: 25px; right: 15px; background: transparent;
  border: none; font-size: 22px; cursor: pointer; outline: none; transition: transform 0.3s;
}
.theme-toggle:active { transform: scale(0.8); }

.mode {
  display: flex; background: var(--bg); padding: 7px; border-radius: 50px;
  box-shadow: var(--shadow-in); margin-bottom: 25px; animation: slideInUp 0.5s var(--ease);
}
.mode button {
  flex: 1; padding: 12px; border: none; border-radius: 50px; background: transparent;
  font-weight: 600; color: var(--text-sub); cursor: pointer; transition: all 0.3s; font-size: 13px;
}
.mode button.active { background: var(--card-bg); box-shadow: var(--shadow-out); color: var(--text-main); }
body:not(.dark-mode) .mode button.active { color: #764ba2; }

/* GLASSMORPHISM CARD */
.dashboard {
  background: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 30px; box-shadow: var(--shadow-out);
  margin-bottom: 25px; animation: slideInUp 0.5s var(--ease) 0.1s both;
}
.dashboard h3 { margin: 0 0 20px; font-size: 18px; color: var(--text-main); display: flex; align-items: center; gap: 10px; }
body:not(.dark-mode) .dashboard h3 { color: #764ba2; }

/* INPUTS */
.input-group { position: relative; margin-bottom: 20px; }
.input-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); z-index: 2;}
input[type="text"], input[type="number"], input[type="date"] {
  width: 100%; padding: 15px 15px 15px 45px; border: none; border-radius: 15px;
  background: var(--input-bg); box-shadow: var(--shadow-in); font-size: 16px;
  color: var(--text-main); font-family: inherit; transition: box-shadow 0.3s;
}
input:focus { outline: none; box-shadow: inset 1px 1px 3px rgba(0,0,0,0.2), inset -1px -1px 3px rgba(255,255,255, 0.1); }
body.dark-mode input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.7; }

/* CUSTOM SELECT BUTTON UNTUK MENGGANTIKAN NATIVE SELECT */
.custom-select-btn {
  width: 100%; padding: 15px 15px 15px 45px; border-radius: 15px;
  background: var(--input-bg); box-shadow: var(--shadow-in); font-size: 16px;
  color: var(--text-main); font-family: inherit; display: flex; justify-content: space-between;
  align-items: center; cursor: pointer; transition: transform 0.2s;
}
.custom-select-btn:active { transform: scale(0.98); }
.dropdown-arrow { font-size: 12px; color: var(--text-sub); }

.data-row { display: flex; justify-content: space-between; margin-top: 12px; font-weight: 500; font-size: 13px; }
.data-row .label { color: var(--text-sub); }
.data-row .value { font-weight: 700; font-size: 15px; }

.status-zone { margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(150,150,150,0.1); text-align: center; }
.bar-container { background: var(--input-bg); box-shadow: var(--shadow-in); border-radius: 50px; height: 14px; overflow: hidden; margin-bottom: 10px; }
.bar-fill { height: 100%; width: 0%; background: var(--primary-grad); border-radius: 50px; transition: width 0.6s var(--ease), background 0.4s; }
.status-meta { display: flex; justify-content: center; align-items: center; gap: 8px; font-weight: 700; font-size: 16px; }

/* ITEMS */
.list-section h4 { margin: 0 15px 15px; color: var(--text-sub); animation: slideInUp 0.5s var(--ease) 0.2s both; }
.item {
  background: var(--card-bg); border-radius: 20px; padding: 15px; margin-bottom: 15px;
  box-shadow: var(--shadow-out); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  animation: scaleIn 0.3s var(--ease); border: 1px solid rgba(255,255,255,0.05); position: relative; z-index: 1;
}
.item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.item-date { font-size: 11px; color: var(--text-sub); font-weight: 500; }

.item-actions { 
  display: flex; gap: 6px; background: var(--input-bg); border-radius: 12px; 
  padding: 6px; box-shadow: var(--shadow-in); align-items: center;
}
.btn-action {
  background: var(--card-bg); border: none; width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; color: #764ba2;
  cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; padding: 0; box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
}
.btn-action:active { transform: scale(0.9); box-shadow: none; }
body.dark-mode .btn-action { color: #e0e5ec; }

.btn-delete {
  background: rgba(255, 107, 107, 0.15); border: none; width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; color: #ff6b6b; cursor: pointer; transition: transform 0.2s;
}
.btn-delete:active { transform: scale(0.9); }

.item-inputs { display: flex; gap: 10px; margin-bottom: 15px; }
.item input[data-type="nama"] { flex: 2; padding-left: 15px; }
.input-rp-wrapper { flex: 1.5; position: relative; display: flex; align-items: center; }
.input-rp-wrapper span { position: absolute; left: 15px; color: var(--text-sub); font-weight: 600; font-size: 14px; pointer-events: none; }
.input-rp-wrapper input { width: 100%; padding-left: 40px !important; text-align: left; }

.item-controls { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.qty-stepper { display: flex; align-items: center; background: var(--input-bg); box-shadow: var(--shadow-in); border-radius: 50px; overflow: hidden; }
.btn-step { 
  width: 35px; height: 35px; border: none; background: transparent; color: var(--text-main); 
  font-size: 22px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
body:not(.dark-mode) .btn-step { color: #764ba2; }
.qty-display { min-width: 30px; text-align: center; font-weight: 700; font-size: 15px; }
.item-subtotal { font-weight: 800; font-size: 16px; color: var(--text-main); }

/* ACTIONS */
.action-area { padding: 15px; display: flex; flex-direction: column; gap: 10px; animation: slideInUp 0.5s var(--ease) 0.3s both; }
.btn-block { width: 100%; padding: 15px; border: none; border-radius: 15px; font-weight: 700; font-size: 14px; cursor: pointer; transition: transform 0.2s; }
.btn-block:active { transform: scale(0.98); }
.secondary-actions { display: flex; gap: 10px; }
.btn-outline { flex: 1; background: var(--bg); box-shadow: var(--shadow-out); color: var(--text-sub); }
.btn-danger { color: #ff6b6b; }
.btn-primary { background: var(--primary-grad); color: white; border: none;}

.fab {
  position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%;
  background: var(--primary-grad); color: white; font-size: 24px; border: none;
  box-shadow: 0 5px 20px rgba(118, 75, 162, 0.5); z-index: 100; transition: transform 0.2s;
}
.fab:active { transform: scale(0.9) rotate(45deg); }

/* --- CUSTOM DIALOG (POPUP) --- */
.overlay-modal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center; z-index: 9999;
  opacity: 0; visibility: hidden; transition: opacity 0.3s;
}
.overlay-modal.show { opacity: 1; visibility: visible; }
.dialog-box {
  background: var(--card-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 25px;
  width: 90%; max-width: 340px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.3);
  transform: scale(0.9); transition: transform 0.3s var(--ease);
}
.overlay-modal.show .dialog-box { transform: scale(1); }
.dialog-box h3 { margin: 0 0 10px; font-size: 18px; color: var(--text-main); }
.dialog-box p { margin: 0 0 20px; font-size: 14px; color: var(--text-sub); line-height: 1.5; }
.dialog-actions { display: flex; gap: 10px; }

/* --- BAR CHART CSS --- */
.stats-scroll-area { max-height: 350px; overflow-y: auto; padding-right: 5px; margin-bottom: 20px; }
.stat-date-group { margin-bottom: 20px; }
.stat-date-header { 
  text-align: left; font-weight: 700; color: var(--text-main); font-size: 13px;
  padding-bottom: 5px; border-bottom: 1px dashed rgba(150,150,150,0.3); margin-bottom: 10px; 
}
.stat-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 12px; }
.stat-bar-label { width: 85px; text-align: left; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
.stat-bar-track { flex: 1; background: var(--input-bg); height: 14px; border-radius: 10px; overflow: hidden; box-shadow: var(--shadow-in); }
.stat-bar-fill { height: 100%; background: var(--primary-grad); border-radius: 10px; width: 0%; transition: width 0.6s var(--ease); }
.stat-bar-val { width: 45px; text-align: right; font-weight: 700; color: var(--text-main); }

/* --- FULL SCREEN APP (LAHAN KOSONG) --- */
.full-screen-app {
  position: fixed; inset: 0; background: var(--bg); z-index: 10000;
  overflow-y: auto; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
}
.full-screen-app.show { transform: translateX(0); }
.fs-header {
  display: flex; align-items: center; justify-content: space-between; padding: 20px;
  background: var(--card-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 10;
}
.btn-back-text {
  background: var(--input-bg); border: none; padding: 10px 20px; border-radius: 25px;
  box-shadow: var(--shadow-out); color: var(--text-main); font-size: 14px; font-weight: 600; cursor: pointer;
  font-family: 'Poppins', sans-serif; transition: transform 0.2s; display: flex; align-items: center; gap: 6px;
}
.btn-back-text:active { transform: scale(0.95); }

.fs-title { font-size: 16px; font-weight: 700; color: var(--text-main); text-align: right; flex: 1;}
.filter-tabs { display: flex; gap: 10px; padding: 20px 20px 10px; }
.filter-tabs button {
  flex: 1; padding: 12px; border-radius: 15px; border: none; background: var(--input-bg);
  box-shadow: var(--shadow-in); color: var(--text-sub); font-weight: 600; cursor: pointer; transition: all 0.3s;
}
.filter-tabs button.active { background: var(--primary-grad); color: white; box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4); }
.fs-content { padding: 10px 20px 40px; }

footer { text-align: center; padding: 20px 0; font-size: 12px; color: var(--text-sub); opacity: 0.7; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<div id="customDialog" class="overlay-modal">
  <div class="dialog-box">
    <h3 id="dialogTitle">Peringatan</h3>
    <p id="dialogMessage">Apakah Anda yakin?</p>
    <div class="dialog-actions">
      <button id="btnCancelDialog" class="btn-block btn-outline">Batal</button>
      <button id="btnConfirmDialog" class="btn-block btn-primary">Ya</button>
    </div>
  </div>
</div>

<div id="freqModal" class="overlay-modal">
  <div class="dialog-box" style="max-width: 320px;">
    <h3 style="margin-bottom: 20px;">Pilih Frekuensi</h3>
    <div class="dialog-actions" style="flex-direction: column; gap: 12px;">
      <button class="btn-block btn-outline freq-btn" data-val="harian" onclick="selectFreq('harian', 'Nabung Tiap Hari')">Nabung Tiap Hari</button>
      <button class="btn-block btn-outline freq-btn" data-val="mingguan" onclick="selectFreq('mingguan', 'Nabung Tiap Minggu')">Nabung Tiap Minggu</button>
      <button class="btn-block btn-outline freq-btn" data-val="bulanan" onclick="selectFreq('bulanan', 'Nabung Tiap Bulan')">Nabung Tiap Bulan</button>
    </div>
    <button class="btn-block" style="margin-top:15px; background:transparent; color:var(--text-sub); border:none; box-shadow:none;" onclick="closeFreqModal()">Batal</button>
  </div>
</div>

<div id="statsDialog" class="overlay-modal">
  <div class="dialog-box" style="max-width: 380px;">
    <h3 id="statsTitle">Ringkasan Hari Ini</h3>
    <p id="statsSubtitle" style="font-size:12px; color:var(--text-sub); margin-top:-5px; margin-bottom:15px;">Data terbaru</p>
    <div class="stats-scroll-area" id="quickChartContainer"></div>
    <button class="btn-block btn-primary" onclick="closeQuickStats()">Tutup</button>
  </div>
</div>

<div id="fullStatsScreen" class="full-screen-app">
  <div class="fs-header">
    <button class="btn-back-text" onclick="closeFullStats()">Kembali</button>
    <div class="fs-title" id="fsTitle">Laporan Lengkap</div>
  </div>
  <div class="filter-tabs" id="filterTabs">
    <button onclick="renderFullStats('hari_ini')" id="flt_hari_ini">Hari Ini</button>
    <button onclick="renderFullStats('7_hari')" id="flt_7_hari" class="active">7 Hari</button>
    <button onclick="renderFullStats('semua')" id="flt_semua">Semua</button>
  </div>
  <div class="fs-content" id="fullChartContainer"></div>
</div>

<div class="container" id="mainAppContainer">
  <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙</button>
  <header>Manajemen Uang</header>

  <div class="mode">
    <button id="dompetBtn" class="active" onclick="setMode('dompet')">Dompet</button>
    <button id="usahaBtn" onclick="setMode('usaha')">Bisnis</button>
    <button id="tabunganBtn" onclick="setMode('tabungan')">Tabungan</button>
  </div>

  <div class="dashboard">
    <h3 id="title"></h3>
    
    <div class="input-group" id="dateGroup" style="display:none;">
      <span class="input-icon">📅</span>
      <input id="targetDate" type="date">
    </div>

    <div class="input-group" id="freqGroup" style="display:none;">
      <span class="input-icon">⏳</span>
      <div class="custom-select-btn" onclick="openFreqModal()">
        <span id="freqLabel">Nabung Tiap Hari</span>
        <span class="dropdown-arrow">▼</span>
      </div>
    </div>

    <div class="input-group">
      <span class="input-icon">💰</span>
      <input id="base" type="text" inputmode="numeric" placeholder="Loading...">
    </div>

    <div class="data-row">
      <span class="label" id="totalLabel"></span>
      <span class="value">Rp <span id="total">0</span></span>
    </div>
    <div class="data-row">
      <span class="label" id="resultLabel"></span>
      <span class="value" id="resultWrap">Rp <span id="result">0</span></span>
    </div>

    <div class="status-zone">
      <div class="bar-container">
        <div class="bar-fill" id="bar"></div>
      </div>
      <div class="status-meta">
        <span id="emoji">🙂</span>
        <span id="status">Normal</span>
      </div>
    </div>
  </div>

  <div class="list-section">
    <h4>Daftar Rincian</h4>
    <div id="list"></div>
  </div>

  <div class="action-area">
    <div class="secondary-actions" style="margin-bottom: 5px;">
       <button class="btn-block btn-outline" onclick="showQuickStats()">👀 Statistik Cepat</button>
       <button class="btn-block btn-primary" onclick="openFullStats()">📈 Laporan Lengkap</button>
    </div>
    
    <div class="secondary-actions">
      <button class="btn-block btn-outline" onclick="exportData()">💾 Backup</button>
      <button class="btn-block btn-outline" onclick="document.getElementById('importFile').click()">📂 Pulihkan</button>
      <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">
    </div>
    <div class="secondary-actions" style="margin-top: 5px;">
      <button class="btn-block btn-outline btn-danger" onclick="triggerReset()">♻️ Reset Data Mode Ini</button>
    </div>
  </div>

  <footer>dirancang oleh <b>Nor Zajuli Ghani</b></footer>
</div>

<button class="fab" onclick="addItem()">+</button>

<script>
const KEY = "pengelola-uang-pro-v4";

const MODE_CONFIG = {
  dompet: { title: "Ringkasan Dompet", basePlaceholder: "Masukkan Saldo Awal", itemName: "Nama Pengeluaran", priceLabel: "Biaya", totalLabel: "Total Pengeluaran", resultLabel: "Sisa Saldo Anda" },
  usaha: { title: "Kalkulator Usaha", basePlaceholder: "Target Profit / Modal", itemName: "Nama Produk/Jasa", priceLabel: "Harga Jual", totalLabel: "Estimasi Omzet", resultLabel: "Laba / Rugi Kotor" },
  tabungan: { title: "Target Tabungan", basePlaceholder: "Nominal Target Nabung", itemName: "Setoran Ke", priceLabel: "Jumlah Disetor", totalLabel: "Total Terkumpul", resultLabel: "Prediksi Akhir" }
};

let data = { dompet: { base: 0, items: [] }, usaha: { base: 0, items: [] }, tabungan: { base: 0, items: [], targetDate: "", freq: "harian" } };
let mode = "dompet";
let isAnimating = false;

const dom = {
  base: document.getElementById("base"), list: document.getElementById("list"), total: document.getElementById("total"),
  result: document.getElementById("result"), resultWrap: document.getElementById("resultWrap"), bar: document.getElementById("bar"),
  emoji: document.getElementById("emoji"), status: document.getElementById("status"), title: document.getElementById("title"),
  totalLabel: document.getElementById("totalLabel"), resultLabel: document.getElementById("resultLabel"),
  dompetBtn: document.getElementById("dompetBtn"), usahaBtn: document.getElementById("usahaBtn"), tabunganBtn: document.getElementById("tabunganBtn"), themeBtn: document.getElementById("themeBtn"), 
  targetDate: document.getElementById("targetDate"), dateGroup: document.getElementById("dateGroup"), 
  freqGroup: document.getElementById("freqGroup"), freqLabel: document.getElementById("freqLabel"), freqModal: document.getElementById("freqModal"),
  
  dialog: document.getElementById("customDialog"), dialogTitle: document.getElementById("dialogTitle"),
  dialogMessage: document.getElementById("dialogMessage"), btnCancel: document.getElementById("btnCancelDialog"),
  btnConfirm: document.getElementById("btnConfirmDialog"),
  
  statsDialog: document.getElementById("statsDialog"), statsTitle: document.getElementById("statsTitle"),
  quickChartContainer: document.getElementById("quickChartContainer"),
  
  fullStatsScreen: document.getElementById("fullStatsScreen"), fullChartContainer: document.getElementById("fullChartContainer"),
  fsTitle: document.getElementById("fsTitle")
};

const fmt = n => n.toLocaleString("id-ID");
const fmtShort = n => {
  if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + ' Jt';
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + ' Rb';
  return n;
};
const toNum = v => parseInt(v.replace(/\D/g, '')) || 0;
const generateID = () => Date.now().toString(36) + Math.random().toString(36).substring(2);
const getTodayStr = () => new Date().toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'});

let confirmAction = null;
function showDialog(title, message, isConfirm = false, actionCallback = null) {
  dom.dialogTitle.textContent = title; dom.dialogMessage.textContent = message; confirmAction = actionCallback;
  if(isConfirm) { dom.btnCancel.style.display = 'block'; dom.btnConfirm.textContent = "Ya, Lanjutkan"; } 
  else { dom.btnCancel.style.display = 'none'; dom.btnConfirm.textContent = "Tutup"; }
  dom.dialog.classList.add('show');
}
function closeDialog() { dom.dialog.classList.remove('show'); confirmAction = null; }
dom.btnCancel.onclick = closeDialog;
dom.btnConfirm.onclick = () => { if (confirmAction) confirmAction(); closeDialog(); };

// --- LOGIKA CUSTOM SELECT FREKUENSI ---
function openFreqModal() { dom.freqModal.classList.add('show'); }
function closeFreqModal() { dom.freqModal.classList.remove('show'); }

function updateFreqUI() {
  const val = data.tabungan.freq || 'harian';
  const labels = { 'harian': 'Nabung Tiap Hari', 'mingguan': 'Nabung Tiap Minggu', 'bulanan': 'Nabung Tiap Bulan' };
  dom.freqLabel.textContent = labels[val];
  
  document.querySelectorAll('.freq-btn').forEach(btn => {
    if(btn.dataset.val === val) {
       btn.classList.remove('btn-outline');
       btn.style.background = 'var(--primary-grad)';
       btn.style.color = 'white';
       btn.style.boxShadow = '0 5px 15px rgba(118, 75, 162, 0.4)';
    } else {
       btn.classList.add('btn-outline');
       btn.style.background = '';
       btn.style.color = '';
       btn.style.boxShadow = '';
    }
  });
}

function selectFreq(val, label) {
  data.tabungan.freq = val;
  save();
  updateFreqUI();
  hitung();
  closeFreqModal();
}

function generateBarChartHTML(itemsToProcess, isQtyMode) {
  if (itemsToProcess.length === 0) {
    return `<div style="text-align:center; color:var(--text-sub); padding:30px;">Tidak ada data pada periode ini.</div>`;
  }
  let byDate = {};
  itemsToProcess.forEach(it => {
    let d = it.date || "Tanpa Tanggal";
    let name = (it.nama || "Tanpa Nama").trim();
    if(name.length > 15) name = name.substring(0,15) + "..."; 
    if(!byDate[d]) byDate[d] = {};
    let valToAdd = isQtyMode ? it.qty : (it.nom * it.qty);
    byDate[d][name] = (byDate[d][name] || 0) + valToAdd;
  });
  let maxVal = 0;
  Object.values(byDate).forEach(dayObj => {
    Object.values(dayObj).forEach(val => { if(val > maxVal) maxVal = val; });
  });
  let uniqueDates = [...new Set(itemsToProcess.map(it => it.date || "Tanpa Tanggal"))];
  let html = "";
  uniqueDates.forEach(d => {
    html += `<div class="stat-date-group"><div class="stat-date-header">📅 ${d}</div>`;
    let dayItems = Object.keys(byDate[d]).map(k => ({name: k, val: byDate[d][k]})).sort((a,b) => b.val - a.val);
    dayItems.forEach(it => {
      let pct = maxVal > 0 ? (it.val / maxVal) * 100 : 0;
      let displayVal = isQtyMode ? `${it.val}x` : fmtShort(it.val);
      html += `<div class="stat-bar-row">
          <div class="stat-bar-label">${it.name}</div>
          <div class="stat-bar-track"><div class="stat-bar-fill" style="width: ${pct}%"></div></div>
          <div class="stat-bar-val">${displayVal}</div>
        </div>`;
    });
    html += `</div>`;
  });
  return html;
}

function showQuickStats() {
  const isQtyMode = (mode === 'usaha');
  const todayStr = getTodayStr();
  const itemsToday = data[mode].items.filter(it => it.date === todayStr);
  dom.quickChartContainer.innerHTML = generateBarChartHTML(itemsToday, isQtyMode);
  dom.statsDialog.classList.add('show');
}
function closeQuickStats() { dom.statsDialog.classList.remove('show'); }
// Tambahkan fungsi ini agar tidak error saat ganti mode
function updateFreqUI() {
  const val = data.tabungan.freq || 'harian';
  const labels = { 
    'harian': 'Nabung Tiap Hari', 
    'mingguan': 'Nabung Tiap Minggu', 
    'bulanan': 'Nabung Tiap Bulan' 
  };
  dom.freqLabel.textContent = labels[val];
  
  // Update visual tombol di dalam modal frekuensi
  document.querySelectorAll('.freq-btn').forEach(btn => {
    if(btn.dataset.val === val) {
       btn.classList.remove('btn-outline');
       btn.style.background = 'var(--primary-grad)';
       btn.style.color = 'white';
    } else {
       btn.classList.add('btn-outline');
       btn.style.background = '';
       btn.style.color = '';
    }
  });
}
function openFullStats() {
  dom.fsTitle.textContent = `Laporan ${mode === 'dompet' ? 'Pengeluaran' : mode === 'usaha' ? 'Bisnis' : 'Tabungan'}`;
  dom.fullStatsScreen.classList.add('show');
  history.pushState({ page: 'fullStats' }, 'Laporan Lengkap', '#laporan');
  renderFullStats('7_hari'); 
}
function closeFullStats() {
  dom.fullStatsScreen.classList.remove('show');
  if(history.state && history.state.page === 'fullStats') { history.back(); }
}
window.addEventListener('popstate', (e) => {
  if(dom.fullStatsScreen.classList.contains('show')) { dom.fullStatsScreen.classList.remove('show'); }
});

function renderFullStats(filterType) {
  document.querySelectorAll('.filter-tabs button').forEach(b => b.classList.remove('active'));
  document.getElementById(`flt_${filterType}`).classList.add('active');
  const isQtyMode = (mode === 'usaha');
  let filteredItems = [];
  const today = new Date(); today.setHours(0,0,0,0);

  if (filterType === 'hari_ini') {
    const todayStr = getTodayStr();
    filteredItems = data[mode].items.filter(it => it.date === todayStr);
  } else if (filterType === '7_hari') {
    filteredItems = data[mode].items.filter(it => {
      if(!it.date) return false;
      const itemDate = new Date(it.date);
      const diffTime = Math.abs(today - itemDate);
      return Math.ceil(diffTime / (1000 * 60 * 60 * 24)) <= 7;
    });
  } else { filteredItems = data[mode].items; }
  dom.fullChartContainer.innerHTML = generateBarChartHTML(filteredItems, isQtyMode);
}

let isDark = localStorage.getItem('theme_dark') === 'true';
if(isDark) applyTheme();
function applyTheme() {
  document.body.classList.toggle('dark-mode', isDark);
  dom.themeBtn.textContent = isDark ? '☀️' : '🌙';
  setTimeout(() => hitung(), 50);
}
function toggleTheme() { isDark = !isDark; localStorage.setItem('theme_dark', isDark); applyTheme(); }

function save() { localStorage.setItem(KEY, JSON.stringify(data)); }
function load() {
  const s = localStorage.getItem(KEY);
  if (s) { 
    try { 
      let parsed = JSON.parse(s);
      data.dompet = parsed.dompet || { base: 0, items: [] };
      data.usaha = parsed.usaha || { base: 0, items: [] };
      data.tabungan = parsed.tabungan || { base: 0, items: [], targetDate: "", freq: "harian" };
    } catch(e) {} 
  }
}
function exportData() {
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));
  const a = document.createElement('a'); a.href = dataStr;
  a.download = `Keuangan_${new Date().getTime()}.json`; a.click();
}
function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(event) {
    try {
      const parsed = JSON.parse(event.target.result);
      if(parsed.dompet || parsed.usaha) {
        data.dompet = parsed.dompet || { base: 0, items: [] };
        data.usaha = parsed.usaha || { base: 0, items: [] };
        data.tabungan = parsed.tabungan || { base: 0, items: [], targetDate: "", freq: "harian" };
        save(); render(); showDialog("Sukses! 🎉", "Data keuangan berhasil dipulihkan.");
      } else throw new Error();
    } catch(err) { showDialog("Gagal ❌", "Format file tidak valid."); }
  };
  reader.readAsText(file); e.target.value = '';
}

function moveItemWithAnimation(id, direction) {
  if(isAnimating) return;
  const items = data[mode].items;
  const index = items.findIndex(it => it.id === id);
  if (index < 0) return;
  const newIndex = index + direction;
  if (newIndex < 0 || newIndex >= items.length) return; 
  isAnimating = true;
  
  const itemElements = dom.list.children;
  const currentEl = itemElements[index];
  const targetEl = itemElements[newIndex];
  const currentRect = currentEl.getBoundingClientRect();
  const targetRect = targetEl.getBoundingClientRect();
  const distance = targetRect.top - currentRect.top;
  
  currentEl.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1)';
  targetEl.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1)';
  currentEl.style.transform = `translateY(${distance}px)`;
  currentEl.style.zIndex = 10;
  targetEl.style.transform = `translateY(${-distance}px)`;
  
  setTimeout(() => {
    currentEl.style.transition = ''; currentEl.style.transform = ''; currentEl.style.zIndex = '';
    targetEl.style.transition = ''; targetEl.style.transform = '';
    if (direction === -1) dom.list.insertBefore(currentEl, targetEl);
    else dom.list.insertBefore(targetEl, currentEl);
    
    const temp = items[index]; items[index] = items[newIndex]; items[newIndex] = temp;
    save(); isAnimating = false;
  }, 300);
}

function setMode(m) {
  mode = m;
  dom.dompetBtn.classList.toggle("active", m === "dompet"); 
  dom.usahaBtn.classList.toggle("active", m === "usaha");
  dom.tabunganBtn.classList.toggle("active", m === "tabungan"); 
  
  dom.dateGroup.style.display = m === "tabungan" ? "block" : "none";
  dom.freqGroup.style.display = m === "tabungan" ? "block" : "none";
  
  const c = MODE_CONFIG[mode];
  if (mode === 'dompet') dom.title.innerHTML = '👛 ' + c.title;
  else if (mode === 'usaha') dom.title.innerHTML = '📈 ' + c.title;
  else dom.title.innerHTML = '🐖 ' + c.title;
  
  dom.base.placeholder = c.basePlaceholder; dom.totalLabel.textContent = c.totalLabel; dom.resultLabel.textContent = c.resultLabel;
  updateFreqUI();
  render();
}

dom.base.oninput = () => {
  const n = toNum(dom.base.value); data[mode].base = n; dom.base.value = n ? fmt(n) : "";
  save(); hitung();
};

dom.targetDate.onchange = e => {
  if (mode === 'tabungan') { data.tabungan.targetDate = e.target.value; save(); hitung(); }
};

function addItem() {
  const dateStr = getTodayStr();
  data[mode].items.unshift({ id: generateID(), nama: "", nom: 0, qty: 1, date: dateStr });
  save(); render();
}

function triggerDelete(id) {
  showDialog("Hapus Rincian?", "Data yang dihapus tidak dapat dikembalikan.", true, () => {
    data[mode].items = data[mode].items.filter(it => it.id !== id); save(); render();
  });
}

function triggerReset() {
  showDialog("Reset Data?", `Semua data di mode ${mode.toUpperCase()} akan dihapus bersih. Lanjutkan?`, true, () => {
    data[mode].items = []; data[mode].base = 0; 
    if (mode === 'tabungan') { data.tabungan.targetDate = ""; data.tabungan.freq = "harian"; }
    save(); render();
  });
}

function render() {
  dom.list.innerHTML = ""; dom.base.value = data[mode].base ? fmt(data[mode].base) : "";
  const c = MODE_CONFIG[mode];

  if (mode === 'tabungan') {
    dom.targetDate.value = data.tabungan.targetDate || "";
    updateFreqUI();
  }

  if (data[mode].items.length === 0) {
    dom.list.innerHTML = `<div style="text-align:center; color:var(--text-sub); padding:30px; background:var(--card-bg); border-radius:20px; box-shadow:var(--shadow-in);">Belum ada data rincian.</div>`;
    hitung(); return;
  }

  const fragment = document.createDocumentFragment();

  data[mode].items.forEach((it) => {
    const d = document.createElement("div"); d.className = "item";
    const iconUp = `<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M13 19V7.83l4.88 4.88c.39.39 1.03.39 1.42 0 .39-.39.39-1.02 0-1.41l-6.59-6.59a.996.996 0 0 0-1.41 0l-6.59 6.59a.996.996 0 1 0 1.41 1.41L11 7.83V19c0 .55.45 1 1 1s1-.45 1-1z"/></svg>`;
    const iconDown = `<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M11 5v11.17l-4.88-4.88c-.39-.39-1.03-.39-1.42 0-.39.39-.39 1.02 0 1.41l6.59 6.59c.39.39 1.02.39 1.41 0l6.59-6.59c.39-.39.39-1.02 0-1.41-.39-.39-1.02-.39-1.41 0L13 16.17V5c0-.55-.45-1-1-1s-1 .45-1 1z"/></svg>`;
    
    d.innerHTML = `
      <div class="item-header">
        <span class="item-date">📅 ${it.date || ''}</span>
        <div class="item-actions">
          <button class="btn-action" onclick="moveItemWithAnimation('${it.id}', -1)" title="Geser ke Atas">${iconUp}</button>
          <button class="btn-action" onclick="moveItemWithAnimation('${it.id}', 1)" title="Geser ke Bawah">${iconDown}</button>
          <button class="btn-delete" onclick="triggerDelete('${it.id}')" title="Hapus">✕</button>
        </div>
      </div>
      <div class="item-inputs">
        <input type="text" data-type="nama" placeholder="${c.itemName}" value="${it.nama || ''}">
        <div class="input-rp-wrapper">
          <span>Rp</span>
          <input type="text" inputmode="numeric" data-type="harga" placeholder="${c.priceLabel}" value="${it.nom ? fmt(it.nom) : ''}">
        </div>
      </div>
      <div class="item-controls">
        <div class="qty-stepper">
          <button class="btn-step">−</button><div class="qty-display">${it.qty}</div><button class="btn-step">+</button>
        </div>
        <div class="item-subtotal">Rp ${fmt(it.nom * it.qty)}</div>
      </div>`;

    const inputs = d.querySelectorAll("input"); const btns = d.querySelectorAll(".btn-step");
    inputs[0].onchange = e => { it.nama = e.target.value; save(); };
    inputs[1].oninput = e => {
      const n = toNum(e.target.value); it.nom = n; e.target.value = n ? fmt(n) : "";
      save(); d.querySelector(".item-subtotal").textContent = `Rp ${fmt(it.nom * it.qty)}`; hitung();
    };

    btns[0].onclick = () => { if (it.qty > 1) { it.qty--; save(); d.querySelector(".qty-display").textContent=it.qty; d.querySelector(".item-subtotal").textContent=`Rp ${fmt(it.nom*it.qty)}`; hitung(); } else triggerDelete(it.id); };
    btns[1].onclick = () => { it.qty++; save(); d.querySelector(".qty-display").textContent=it.qty; d.querySelector(".item-subtotal").textContent=`Rp ${fmt(it.nom*it.qty)}`; hitung(); };
    
    fragment.appendChild(d);
  });
  
  dom.list.appendChild(fragment);
  hitung();
}

function varColor(name) { return getComputedStyle(document.body).getPropertyValue(name).trim(); }

function hitung() {
  let totalData = 0; data[mode].items.forEach(i => totalData += i.nom * i.qty);
  dom.total.textContent = fmt(totalData);
  const baseVal = data[mode].base; let result, percent, emoji, status, barColor;

  if (mode === "dompet") {
    result = baseVal - totalData; percent = baseVal ? (totalData / baseVal) * 100 : 0;
    if (percent <= 0 && baseVal > 0) { emoji = "💰"; status = "Uang Utuh"; barColor = varColor('--success-grad'); }
    else if (percent <= 50) { emoji = "😁👍🏻"; status = "Hemat Mantap"; barColor = varColor('--success-grad'); }
    else if (percent <= 80) { emoji = "😃"; status = "Wajar"; barColor = varColor('--primary-grad'); }
    else if (percent <= 100) { emoji = "😨"; status = "Hampir Habis"; barColor = "#ff9f43"; }
    else { emoji = "☠️"; status = "Kebobolan!"; barColor = varColor('--danger-grad'); }
  } else if (mode === "usaha") {
    result = totalData - baseVal; 
    if (baseVal === 0 && totalData > 0) { percent = 100; emoji = "😇"; status = "Cuan Tanpa Modal"; barColor = varColor('--success-grad'); }
    else if (baseVal === 0) { percent = 0; emoji = "🏢"; status = "Siap Berbisnis?"; barColor = varColor('--primary-grad'); }
    else {
      percent = (totalData / baseVal) * 100;
      if (result > baseVal * 0.5) { emoji = "🤑🔥"; status = "Untung Besar!"; barColor = varColor('--success-grad'); }
      else if (result > 0) { emoji = "🙂"; status = "Lumayan"; barColor = varColor('--success-grad'); }
      else if (result === 0) { emoji = "😐"; status = "Balik Modal"; barColor = varColor('--primary-grad'); }
      else if (percent > 50) { emoji = "😥"; status = "Rugi Tipis"; barColor = "#ff9f43"; }
      else { emoji = "😭☠️"; status = "Rugi Parah"; barColor = varColor('--danger-grad'); }
    }
  } else if (mode === "tabungan") {
    result = totalData; let remainingDays = 0; let multiplier = 0;
    
    if (data.tabungan.targetDate) {
      const today = new Date(); today.setHours(0,0,0,0);
      const target = new Date(data.tabungan.targetDate); target.setHours(0,0,0,0);
      const diffTime = target - today;
      remainingDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      if (remainingDays < 0) remainingDays = 0;
      
      const freq = data.tabungan.freq || 'harian';
      if (freq === 'mingguan') {
         multiplier = Math.floor(remainingDays / 7);
      } else if (freq === 'bulanan') {
         multiplier = Math.floor(remainingDays / 30);
      } else {
         multiplier = remainingDays;
      }
      
      result = totalData + (multiplier * baseVal);
    }
    
    percent = result ? (totalData / result) * 100 : (totalData > 0 ? 100 : 0);
    if (percent >= 100 && totalData > 0) { emoji = "🎉"; status = "Target Tercapai!"; barColor = varColor('--success-grad'); }
    else if (percent >= 50) { emoji = "🔥"; status = "Hampir Sampai"; barColor = varColor('--primary-grad'); }
    else if (percent > 0) { emoji = "🏃"; status = "Terus Semangat"; barColor = "#ff9f43"; }
    else { emoji = "🎯"; status = "Ayo Mulai Nabung"; barColor = "var(--text-sub)"; }
  }

  dom.result.textContent = fmt(result);
  dom.resultWrap.style.color = result < 0 && mode !== 'tabungan' ? '#ff6b6b' : (isDark ? '#e0e5ec' : '#764ba2');
  dom.bar.style.width = Math.min(percent, 100) + "%"; dom.bar.style.background = barColor;
  dom.emoji.textContent = emoji; dom.status.textContent = status;
}

document.addEventListener("DOMContentLoaded", () => { load(); setMode("dompet"); });
</script>

      navigator.serviceWorker.register('./sw.js').catch(e => console.log('SW fail', e));
